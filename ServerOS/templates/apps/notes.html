{% extends "app_base.html" %}
{% block head %}
<style>
.notes-layout { display: grid; grid-template-columns: 240px 1fr; gap: 0; height: calc(100vh - 130px); border-radius: 18px; overflow: hidden; border: 1px solid var(--glass-border); }
.notes-sidebar { background: rgba(0,0,0,0.3); padding: 16px; overflow-y: auto; border-right: 1px solid var(--glass-border); }
.notes-editor { background: var(--glass-bg); padding: 24px; display: flex; flex-direction: column; }
.note-list-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 4px; transition: 0.2s; font-size: 13px; }
.note-list-item:hover { background: rgba(255,255,255,0.08); }
.note-list-item.active { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3); }
.note-list-item .note-preview { font-size: 11px; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.new-note-btn { width: 100%; padding: 10px; border-radius: 10px; border: 1px dashed rgba(255,255,255,0.2); background: transparent; color: var(--accent-light); cursor: pointer; font-size: 13px; margin-bottom: 12px; transition: 0.2s; }
.new-note-btn:hover { background: rgba(255,255,255,0.06); }
.note-title-input { width: 100%; padding: 8px 0; border: none; background: transparent; color: #fff; font-size: 22px; font-weight: 700; outline: none; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.note-body-input { flex: 1; width: 100%; padding: 0; border: none; background: transparent; color: rgba(255,255,255,0.85); font-size: 14px; line-height: 1.7; outline: none; resize: none; font-family: var(--font); }
.note-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 11px; color: var(--text-secondary); }
.note-footer button { padding: 5px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(239,68,68,0.12); color: #ef4444; cursor: pointer; font-size: 11px; }
@media(max-width:768px){ .notes-layout { grid-template-columns: 1fr; } .notes-sidebar { max-height: 200px; } }
</style>
{% endblock %}
{% block content %}
<div class="notes-layout">
    <div class="notes-sidebar">
        <button class="new-note-btn" onclick="newNote()">+ New Note</button>
        <div id="noteList"></div>
    </div>
    <div class="notes-editor" id="editorPanel">
        <input class="note-title-input" id="noteTitle" placeholder="Note title..." oninput="autoSave()">
        <textarea class="note-body-input" id="noteBody" placeholder="Start writing..." oninput="autoSave()"></textarea>
        <div class="note-footer">
            <span id="noteStatus"></span>
            <button onclick="deleteNote()">🗑 Delete</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
    let notes=[], activeId=null, saveTimer=null;
    function load(){ fetch('/app/notes/api/notes').then(r=>r.json()).then(d=>{ notes=d; renderList(); if(notes.length&&!activeId) selectNote(notes[0].id); }); }
    function renderList(){
        document.getElementById('noteList').innerHTML = notes.map(n=>`
            <div class="note-list-item ${n.id===activeId?'active':''}" onclick="selectNote('${n.id}')">
                <div>${n.title||'Untitled'}</div>
                <div class="note-preview">${(n.body||'').substring(0,50)}</div>
            </div>`).join('');
    }
    window.selectNote = id=>{
        activeId = id;
        const n = notes.find(x=>x.id===id);
        if(n){ document.getElementById('noteTitle').value=n.title||''; document.getElementById('noteBody').value=n.body||''; }
        renderList();
    };
    window.newNote = ()=>{
        const id = 'n_'+Date.now();
        const n = {id, title:'', body:'', created: new Date().toISOString()};
        notes.unshift(n); activeId=id; renderList();
        document.getElementById('noteTitle').value=''; document.getElementById('noteBody').value='';
        document.getElementById('noteTitle').focus();
    };
    window.autoSave = ()=>{
        clearTimeout(saveTimer);
        saveTimer = setTimeout(()=>{
            if(!activeId) return;
            const n = notes.find(x=>x.id===activeId);
            if(n){ n.title=document.getElementById('noteTitle').value; n.body=document.getElementById('noteBody').value; }
            fetch('/app/notes/api/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(n)});
            document.getElementById('noteStatus').textContent='Saved ✓';
            renderList();
        }, 600);
    };
    window.deleteNote = ()=>{
        if(!activeId) return;
        fetch('/app/notes/api/notes/'+activeId,{method:'DELETE'}).then(()=>{
            notes = notes.filter(n=>n.id!==activeId); activeId=null;
            if(notes.length) selectNote(notes[0].id);
            else { document.getElementById('noteTitle').value=''; document.getElementById('noteBody').value=''; }
            renderList();
        });
    };
    load();
})();
</script>
{% endblock %}
