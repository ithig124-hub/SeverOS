{% extends "app_base.html" %}
{% block head %}
<style>
.ss-layout { display: grid; grid-template-columns: 250px 1fr 280px; gap: 20px; height: calc(100vh - 130px); }
.ss-sidebar, .ss-cart { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 18px; overflow-y: auto; }
.ss-main { overflow-y: auto; }
.ss-search { width: 100%; padding: 10px 16px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.06); color: #fff; font-size: 14px; margin-bottom: 16px; outline: none; }
.ss-search:focus { border-color: var(--accent); }
.ss-cat-btn { display: block; width: 100%; text-align: left; padding: 8px 12px; border: none; background: transparent; color: var(--text-secondary); font-size: 13px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 2px; }
.ss-cat-btn:hover, .ss-cat-btn.active { background: rgba(255,255,255,0.1); color: #fff; }
.food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
.food-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px; text-align: center; cursor: pointer; transition: 0.25s; }
.food-card:hover { transform: translateY(-3px); background: var(--glass-hover); }
.food-emoji { font-size: 40px; margin-bottom: 8px; }
.food-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.food-meta { font-size: 11px; color: var(--text-secondary); }
.food-price { font-size: 15px; font-weight: 700; color: #34d399; margin-top: 6px; }
.cart-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 12px; }
.cart-total { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.12); font-size: 16px; font-weight: 700; color: #34d399; text-align: right; }
.cart-rm { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; }
@media(max-width:900px){ .ss-layout { grid-template-columns: 1fr; } .ss-sidebar,.ss-cart { max-height: 200px; } }
</style>
{% endblock %}
{% block content %}
<div class="ss-layout">
    <div class="ss-sidebar">
        <h3 style="font-size:14px;margin-bottom:12px;">Categories</h3>
        <button class="ss-cat-btn active" onclick="filterCat('all',this)">🏷 All Items</button>
        <button class="ss-cat-btn" onclick="filterCat('Snacks',this)">🍿 Snacks</button>
        <button class="ss-cat-btn" onclick="filterCat('Dairy',this)">🥛 Dairy</button>
        <button class="ss-cat-btn" onclick="filterCat('Meat',this)">🍗 Meat</button>
        <button class="ss-cat-btn" onclick="filterCat('Fruits',this)">🍎 Fruits</button>
        <button class="ss-cat-btn" onclick="filterCat('Beverages',this)">☕ Beverages</button>
        <button class="ss-cat-btn" onclick="filterCat('Meals',this)">🍜 Meals</button>
        <button class="ss-cat-btn" onclick="filterCat('Bakery',this)">🍞 Bakery</button>
        <hr style="border-color:rgba(255,255,255,0.08);margin:12px 0">
        <h3 style="font-size:14px;margin-bottom:8px;">Quick Lists</h3>
        <button class="ss-cat-btn" onclick="loadTemplate('study')">📚 Study Fuel</button>
        <button class="ss-cat-btn" onclick="loadTemplate('gym')">💪 Gym Pack</button>
        <button class="ss-cat-btn" onclick="loadTemplate('party')">🎉 Party Night</button>
    </div>
    <div class="ss-main">
        <input class="ss-search" placeholder="Search food..." oninput="searchFood(this.value)">
        <div class="food-grid" id="foodGrid"></div>
    </div>
    <div class="ss-cart">
        <h3 style="font-size:14px;margin-bottom:12px;">🛒 Cart</h3>
        <div id="cartItems">Cart is empty</div>
        <div class="cart-total" id="cartTotal"></div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
    let foods=[], cart=[], activeCat='all', query='';
    fetch('/app/snackscout/api/foods').then(r=>r.json()).then(d=>{ foods=d; render(); });
    function render(){
        let filtered=foods;
        if(activeCat!=='all') filtered=filtered.filter(f=>f.cat===activeCat);
        if(query) filtered=filtered.filter(f=>f.name.toLowerCase().includes(query.toLowerCase()));
        document.getElementById('foodGrid').innerHTML=filtered.map(f=>`
            <div class="food-card" onclick="addToCart(${f.id})">
                <div class="food-emoji">${f.img}</div>
                <div class="food-name">${f.name}</div>
                <div class="food-meta">${f.cat} · ${f.cal} cal · ${f.store}</div>
                <div class="food-price">$${f.price.toFixed(2)}</div>
            </div>`).join('');
    }
    function renderCart(){
        if(cart.length===0){ document.getElementById('cartItems').innerHTML='Cart is empty'; document.getElementById('cartTotal').textContent=''; return; }
        document.getElementById('cartItems').innerHTML=cart.map((c,i)=>`<div class="cart-item"><span>${c.img} ${c.name} x${c.qty}</span><span>$${(c.price*c.qty).toFixed(2)} <button class="cart-rm" onclick="rmCart(${i})">✕</button></span></div>`).join('');
        const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
        document.getElementById('cartTotal').textContent='Total: $'+total.toFixed(2);
    }
    window.addToCart=id=>{
        const f=foods.find(x=>x.id===id); if(!f) return;
        const existing=cart.find(c=>c.id===id);
        if(existing) existing.qty++; else cart.push({...f,qty:1});
        renderCart();
    };
    window.rmCart=i=>{ cart.splice(i,1); renderCart(); };
    window.filterCat=(cat,btn)=>{
        activeCat=cat; render();
        document.querySelectorAll('.ss-cat-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
    };
    window.searchFood=q=>{ query=q; render(); };
    window.loadTemplate=type=>{
        const templates={study:[6,7,10],gym:[2,5,12],party:[4,11,7]};
        cart=[]; (templates[type]||[]).forEach(id=>{ const f=foods.find(x=>x.id===id); if(f) cart.push({...f,qty:1}); });
        renderCart();
    };
})();
</script>
{% endblock %}
