{% extends "app_base.html" %}
{% block head %}
<style>
.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
.widget { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 22px; transition: 0.25s; }
.widget:hover { background: var(--glass-hover); transform: translateY(-2px); }
.widget h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.widget-large { grid-column: span 2; }
.time-display { font-size: 48px; font-weight: 300; text-align: center; line-height: 1.2; }
.date-display { font-size: 16px; color: var(--text-secondary); text-align: center; margin-top: 6px; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
.stat-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; margin-top: 4px; }
.stat-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.quick-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 10px; background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: #fff; text-decoration: none; font-size: 12px; transition: 0.2s; margin: 4px; }
.quick-link:hover { background: rgba(255,255,255,0.12); }
.weather-icon { font-size: 36px; }
@media(max-width:768px){ .widget-large { grid-column: span 1; } }
</style>
{% endblock %}
{% block content %}
<div class="dash-grid">
    <div class="widget">
        <h3>🕐 Time & Date</h3>
        <div class="time-display" id="bigClock"></div>
        <div class="date-display" id="bigDate"></div>
    </div>
    <div class="widget">
        <h3>⛅ Weather</h3>
        <div style="text-align:center;">
            <div class="weather-icon" id="wxIcon">🌤</div>
            <div style="font-size:28px;font-weight:300" id="wxTemp">--°C</div>
            <div style="font-size:13px;color:var(--text-secondary)" id="wxDesc">Enter a city below</div>
            <input id="wxCity" placeholder="City name..." style="margin-top:12px;width:100%;padding:8px 12px;border-radius:10px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.06);color:#fff;font-size:12px;outline:none;" onkeydown="if(event.key==='Enter')fetchWeather()">
        </div>
    </div>
    <div class="widget widget-large">
        <h3>💻 System Stats</h3>
        <div id="dashStats">Loading...</div>
    </div>
    <div class="widget">
        <h3>🔗 Quick Links</h3>
        <div>
            <a class="quick-link" href="/app/globe">🌍 Globe</a>
            <a class="quick-link" href="/app/notes">📝 Notes</a>
            <a class="quick-link" href="/app/library">📚 Library</a>
            <a class="quick-link" href="/app/map">🗺️ Map</a>
            <a class="quick-link" href="/app/monitor">📈 Monitor</a>
            <a class="quick-link" href="/app/worldclock">🕐 Clocks</a>
        </div>
    </div>
    <div class="widget">
        <h3>📋 Quick Notes</h3>
        <textarea id="quickNotes" style="width:100%;height:120px;border:none;background:rgba(255,255,255,0.04);border-radius:10px;padding:10px;color:rgba(255,255,255,0.8);font-size:13px;resize:none;outline:none;font-family:var(--font);" placeholder="Jot something down..." oninput="localStorage.setItem('serveros_quicknotes',this.value)"></textarea>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
    function tickClock(){
        const now=new Date();
        document.getElementById('bigClock').textContent=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        document.getElementById('bigDate').textContent=now.toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    }
    tickClock(); setInterval(tickClock,1000);

    function fetchStats(){
        fetch('/api/stats').then(r=>r.json()).then(d=>{
            if(d.error) return;
            document.getElementById('dashStats').innerHTML=`
                <div class="stat-row"><span>CPU</span><span>${d.cpu_percent}%</span></div>
                <div class="stat-bar"><div class="stat-fill" style="width:${d.cpu_percent}%;background:${d.cpu_percent>80?'#ef4444':d.cpu_percent>50?'#f59e0b':'#34d399'}"></div></div>
                <div class="stat-row" style="margin-top:10px"><span>RAM</span><span>${d.ram_used_gb}GB / ${d.ram_total_gb}GB (${d.ram_percent}%)</span></div>
                <div class="stat-bar"><div class="stat-fill" style="width:${d.ram_percent}%;background:${d.ram_percent>85?'#ef4444':d.ram_percent>60?'#f59e0b':'#34d399'}"></div></div>
                <div class="stat-row" style="margin-top:10px"><span>Disk</span><span>${d.disk_used_gb}GB / ${d.disk_total_gb}GB (${d.disk_percent}%)</span></div>
                <div class="stat-bar"><div class="stat-fill" style="width:${d.disk_percent}%;background:${d.disk_percent>90?'#ef4444':d.disk_percent>70?'#f59e0b':'#34d399'}"></div></div>
                <div class="stat-row" style="margin-top:10px"><span>Uptime</span><span>${d.uptime}</span></div>`;
        });
    }
    fetchStats(); setInterval(fetchStats,5000);

    window.fetchWeather = ()=>{
        const city = document.getElementById('wxCity').value.trim();
        if(!city) return;
        fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`)
            .then(r=>r.json()).then(d=>{
                const cur = d.current_condition[0];
                const temp = cur.temp_C;
                const desc = cur.weatherDesc[0].value;
                const code = parseInt(cur.weatherCode);
                let icon = '🌤';
                if(code>=200&&code<300) icon='⛈'; else if(code>=300&&code<600) icon='🌧';
                else if(code>=600&&code<700) icon='❄️'; else if(code>=700&&code<800) icon='🌫';
                else if(code===800) icon='☀️'; else if(code>800) icon='☁️';
                document.getElementById('wxIcon').textContent=icon;
                document.getElementById('wxTemp').textContent=temp+'°C';
                document.getElementById('wxDesc').textContent=desc+' — '+city;
            }).catch(()=>{ document.getElementById('wxDesc').textContent='Could not fetch weather'; });
    };

    const qn=localStorage.getItem('serveros_quicknotes');
    if(qn) document.getElementById('quickNotes').value=qn;
})();
</script>
{% endblock %}
