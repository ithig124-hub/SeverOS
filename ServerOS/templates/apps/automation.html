{% extends "app_base.html" %}
{% block head %}
<style>
.auto-container { max-width: 900px; }
.auto-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.auto-stats { display: flex; gap: 10px; }
.auto-stat {
    padding: 8px 16px; border-radius: 10px;
    background: var(--glass-bg); backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border); font-size: 12px;
}
.auto-stat strong { font-size: 18px; font-weight: 700; }
.auto-new-btn {
    padding: 9px 18px; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all var(--transition-fast); border: none;
}
.auto-new-btn:hover { filter: brightness(1.15); transform: scale(1.03); }

.rules-list { display: flex; flex-direction: column; gap: 12px; }
.rule-card {
    background: var(--glass-bg); backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border); border-radius: var(--glass-radius);
    box-shadow: var(--glass-shadow); padding: 20px;
    transition: all var(--transition-fast);
    animation: ruleIn 0.4s cubic-bezier(.16,1,.3,1) both;
}
.rule-card:hover { border-color: var(--glass-hover); box-shadow: var(--glass-shadow), var(--glass-glow); }
.rule-card.disabled { opacity: 0.5; }
@keyframes ruleIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.rule-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.rule-name { font-size: 15px; font-weight: 600; flex: 1; }
.rule-toggle {
    position: relative; width: 44px; height: 24px; border-radius: 12px;
    background: rgba(255,255,255,0.1); cursor: pointer; transition: background var(--transition-fast);
}
.rule-toggle.on { background: var(--accent); }
.rule-toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #fff; transition: transform var(--transition-fast);
}
.rule-toggle.on::after { transform: translateX(20px); }
.rule-body { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.rule-block {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
}
.rule-if { background: rgba(59,130,246,0.12); color: #60a5fa; }
.rule-arrow { color: var(--text-tertiary); font-size: 18px; }
.rule-then { background: rgba(139,92,246,0.12); color: #a78bfa; }
.rule-meta { display: flex; gap: 16px; margin-top: 12px; font-size: 11px; color: var(--text-tertiary); }
.rule-actions { display: flex; gap: 6px; margin-top: 12px; }
.rule-action-btn {
    padding: 5px 10px; border-radius: 6px; font-size: 11px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-secondary); cursor: pointer; transition: all var(--transition-fast);
}
.rule-action-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
.rule-action-btn.delete { color: #ef4444; }
.rule-action-btn.delete:hover { background: rgba(239,68,68,0.1); }

/* Builder modal */
.builder-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
}
.builder-overlay.open { display: flex; }
.builder-modal {
    width: 90%; max-width: 520px;
    background: var(--glass-bg); backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border); border-radius: var(--glass-radius);
    box-shadow: var(--glass-shadow); padding: 24px;
    animation: modalIn 0.3s cubic-bezier(.16,1,.3,1);
    max-height: 85vh; overflow-y: auto;
}
@keyframes modalIn { from{opacity:0;transform:translateY(-16px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);} }
.builder-modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.builder-section { margin-bottom: 18px; }
.builder-section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-tertiary); margin-bottom: 8px; }
.builder-row { display: flex; gap: 8px; margin-bottom: 8px; }
.builder-row select, .builder-row input {
    flex: 1; padding: 9px 12px; border-radius: 8px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
    color: var(--text-primary); font-size: 13px; font-family: var(--font); outline: none;
}
.builder-row select option { background: #1a1a2e; }
.builder-row input:focus, .builder-row select:focus { border-color: rgba(255,255,255,0.25); }
.builder-preview {
    padding: 12px; border-radius: 8px; margin-top: 12px;
    background: rgba(255,255,255,0.04); font-size: 13px; color: var(--text-secondary);
}
.builder-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.builder-btn {
    padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all var(--transition-fast); border: 1px solid transparent;
}
.builder-btn.cancel { background: rgba(255,255,255,0.06); color: var(--text-secondary); border-color: var(--glass-border); }
.builder-btn.cancel:hover { background: rgba(255,255,255,0.1); }
.builder-btn.save { background: var(--accent); color: #fff; }
.builder-btn.save:hover { filter: brightness(1.15); }

.eval-results {
    margin-top: 20px; padding: 16px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: var(--glass-radius); backdrop-filter: var(--glass-blur);
}
.eval-results h4 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
.eval-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.eval-item:last-child { border-bottom: none; }
.eval-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.eval-dot.fired { background: #22c55e; }
.eval-dot.idle { background: rgba(255,255,255,0.15); }
</style>
{% endblock %}
{% block content %}
<div class="auto-container">
    <div class="auto-header">
        <div class="auto-stats">
            <div class="auto-stat"><strong id="totalRules">0</strong> Rules</div>
            <div class="auto-stat"><strong id="enabledRules">0</strong> Active</div>
        </div>
        <button class="auto-new-btn" onclick="openBuilder()">⚡ New Rule</button>
    </div>
    <div class="rules-list" id="rulesList"></div>
    <div class="eval-results" id="evalResults" style="display:none">
        <h4>⚡ Last Evaluation</h4>
        <div id="evalList"></div>
    </div>
</div>

<div class="builder-overlay" id="builderOverlay">
    <div class="builder-modal">
        <h3>⚡ Rule Builder</h3>
        <div class="form-group" style="margin-bottom:14px"><label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px">Rule Name</label><input id="ruleName" placeholder="e.g., Night Mode" style="width:100%;padding:9px 12px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);color:var(--text-primary);font-size:13px;outline:none;font-family:var(--font)"></div>
        <div class="builder-section">
            <div class="builder-section-label">IF (Trigger)</div>
            <div class="builder-row">
                <select id="triggerType" onchange="updatePreview()"></select>
                <select id="triggerOp" onchange="updatePreview()"></select>
                <input id="triggerVal" placeholder="Value" oninput="updatePreview()">
            </div>
        </div>
        <div class="builder-section">
            <div class="builder-section-label">THEN (Action)</div>
            <div class="builder-row">
                <select id="actionType" onchange="updatePreview()"></select>
                <input id="actionVal" placeholder="Value" oninput="updatePreview()">
            </div>
        </div>
        <div class="builder-preview" id="rulePreview">IF ... THEN ...</div>
        <div class="builder-actions">
            <button class="builder-btn cancel" onclick="closeBuilder()">Cancel</button>
            <button class="builder-btn save" onclick="saveRule()">Create Rule</button>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
    var schema = null;

    function loadSchema(){
        return fetch('/app/automation/api/rules/schema').then(r=>r.json()).then(s=>{
            schema=s;
            var tt=document.getElementById('triggerType');
            tt.innerHTML=s.trigger_types.map(t=>'<option value="'+t.type+'">'+t.label+'</option>').join('');
            var at=document.getElementById('actionType');
            at.innerHTML=s.action_types.map(a=>'<option value="'+a.type+'">'+a.label+'</option>').join('');
            updateOps();
        });
    }

    function updateOps(){
        if(!schema)return;
        var type=document.getElementById('triggerType').value;
        var info=schema.trigger_types.find(t=>t.type===type);
        var op=document.getElementById('triggerOp');
        op.innerHTML=(info?info.operators:[]).map(o=>'<option value="'+o+'">'+o+'</option>').join('');
        document.getElementById('triggerVal').placeholder=info?info.value_hint:'Value';
        window.updatePreview();
    }
    document.getElementById('triggerType').addEventListener('change',updateOps);

    window.updatePreview=function(){
        var tt=document.getElementById('triggerType');
        var to=document.getElementById('triggerOp');
        var tv=document.getElementById('triggerVal');
        var at=document.getElementById('actionType');
        var av=document.getElementById('actionVal');
        var tLabel=tt.options[tt.selectedIndex]?tt.options[tt.selectedIndex].text:tt.value;
        var aLabel=at.options[at.selectedIndex]?at.options[at.selectedIndex].text:at.value;
        document.getElementById('rulePreview').innerHTML='<strong>IF</strong> '+tLabel+' '+to.value+' <em>'+tv.value+'</em> <strong>→ THEN</strong> '+aLabel+': <em>'+av.value+'</em>';
    };

    function timeAgo(ts){if(!ts)return'never';var d=Math.floor(Date.now()/1000-ts);if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}

    function loadRules(){
        fetch('/app/automation/api/rules').then(r=>r.json()).then(data=>{
            document.getElementById('totalRules').textContent=data.total;
            document.getElementById('enabledRules').textContent=data.enabled;
            var el=document.getElementById('rulesList');
            if(!data.rules.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-tertiary)"><div style="font-size:48px">⚡</div><div style="margin-top:8px">No rules yet. Create your first automation!</div></div>';return;}
            el.innerHTML=data.rules.map(function(r,i){
                return '<div class="rule-card'+(r.enabled?'':' disabled')+'" style="animation-delay:'+(i*0.05)+'s">'+
                    '<div class="rule-header"><span class="rule-name">'+r.name+'</span>'+
                    '<div class="rule-toggle'+(r.enabled?' on':'')+'" onclick="toggleRule(\''+r.id+'\','+(!r.enabled)+')"></div></div>'+
                    '<div class="rule-body">'+
                    '<span class="rule-block rule-if">IF '+r.trigger.type+' '+r.trigger.operator+' '+r.trigger.value+'</span>'+
                    '<span class="rule-arrow">→</span>'+
                    '<span class="rule-block rule-then">THEN '+r.action.type+': '+r.action.value+'</span>'+
                    '</div>'+
                    '<div class="rule-meta"><span>Triggered '+r.trigger_count+'× total</span><span>Last: '+timeAgo(r.last_triggered)+'</span></div>'+
                    '<div class="rule-actions"><button class="rule-action-btn delete" onclick="deleteRule(\''+r.id+'\')">Delete</button></div>'+
                    '</div>';
            }).join('');
        });
    }

    function evaluateRules(){
        fetch('/app/automation/api/rules/evaluate').then(r=>r.json()).then(data=>{
            if(!data.results.length)return;
            var el=document.getElementById('evalResults');
            el.style.display='block';
            document.getElementById('evalList').innerHTML=data.results.map(r=>
                '<div class="eval-item"><span class="eval-dot '+(r.fired?'fired':'idle')+'"></span><span>'+r.name+'</span><span style="color:var(--text-tertiary);margin-left:auto">'+(r.fired?'✓ Triggered':'Idle')+'</span></div>'
            ).join('');
        }).catch(function(){});
    }

    window.toggleRule=function(id,state){fetch('/app/automation/api/rules/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:state})}).then(function(){loadRules();});};
    window.deleteRule=function(id){if(confirm('Delete this rule?')){fetch('/app/automation/api/rules/'+id,{method:'DELETE'}).then(function(){loadRules();});}};
    window.openBuilder=function(){document.getElementById('builderOverlay').classList.add('open');};
    window.closeBuilder=function(){document.getElementById('builderOverlay').classList.remove('open');};
    window.saveRule=function(){
        var name=document.getElementById('ruleName').value.trim();
        if(!name){alert('Rule name required');return;}
        fetch('/app/automation/api/rules',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
            name:name,
            trigger:{type:document.getElementById('triggerType').value,operator:document.getElementById('triggerOp').value,value:document.getElementById('triggerVal').value},
            action:{type:document.getElementById('actionType').value,value:document.getElementById('actionVal').value}
        })}).then(function(){
            closeBuilder();document.getElementById('ruleName').value='';
            document.getElementById('triggerVal').value='';document.getElementById('actionVal').value='';
            loadRules();
        });
    };

    loadSchema().then(function(){loadRules();evaluateRules();});
    setInterval(evaluateRules, 30000);
})();
</script>
{% endblock %}
