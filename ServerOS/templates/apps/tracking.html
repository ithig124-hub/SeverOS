{% extends "app_base.html" %}
{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<style>
.track-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; height: calc(100vh - 130px); }
#trackMap { width: 100%; height: 100%; border-radius: 18px; }
.track-panel { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 18px; overflow-y: auto; }
.track-stat { padding: 12px; background: rgba(255,255,255,0.04); border-radius: 12px; margin-bottom: 10px; }
.track-stat label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
.track-stat .value { font-size: 22px; font-weight: 600; }
.track-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; transition: 0.2s; }
.track-btn.start { background: #22c55e; color: #fff; }
.track-btn.stop { background: #ef4444; color: #fff; }
.track-btn.reset { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid var(--glass-border); }
.log-item { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; color: var(--text-secondary); }
@media(max-width:768px){ .track-layout { grid-template-columns: 1fr; } #trackMap { height: 300px; } }
</style>
{% endblock %}
{% block content %}
<div class="track-layout">
    <div id="trackMap"></div>
    <div class="track-panel">
        <h3 style="font-size:15px;margin-bottom:14px;">📍 GPS Tracker</h3>
        <button class="track-btn start" id="startBtn" onclick="toggleTracking()">▶ Start Tracking</button>
        <button class="track-btn reset" onclick="resetTrack()">↺ Reset</button>
        <div class="track-stat"><label>Distance</label><div class="value" id="trackDist">0.00 km</div></div>
        <div class="track-stat"><label>Duration</label><div class="value" id="trackTime">00:00:00</div></div>
        <div class="track-stat"><label>Speed</label><div class="value" id="trackSpeed">0 km/h</div></div>
        <div class="track-stat"><label>Points Recorded</label><div class="value" id="trackPts">0</div></div>
        <h4 style="font-size:12px;margin-top:14px;margin-bottom:8px;color:var(--text-secondary);">Activity Log</h4>
        <div id="trackLog"></div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
    const map = L.map('trackMap').setView([0,0],2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
    let tracking=false, watchId=null, path=[], polyline=null, startTime=null, timer=null, totalDist=0;

    function haversine(a,b){
        const R=6371, dLat=(b[0]-a[0])*Math.PI/180, dLon=(b[1]-a[1])*Math.PI/180;
        const x=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
        return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    }
    function fmt(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return [h,m,sec].map(v=>String(v).padStart(2,'0')).join(':'); }

    window.toggleTracking = ()=>{
        const btn=document.getElementById('startBtn');
        if(!tracking){
            if(!navigator.geolocation){ alert('Geolocation not available'); return; }
            tracking=true; startTime=Date.now(); path=[];
            btn.textContent='⏹ Stop'; btn.className='track-btn stop';
            watchId=navigator.geolocation.watchPosition(pos=>{
                const pt=[pos.coords.latitude,pos.coords.longitude];
                if(path.length>0) totalDist+=haversine(path[path.length-1],pt);
                path.push(pt);
                if(polyline) map.removeLayer(polyline);
                polyline=L.polyline(path,{color:'#6366f1',weight:4}).addTo(map);
                map.setView(pt,15);
                document.getElementById('trackDist').textContent=totalDist.toFixed(2)+' km';
                document.getElementById('trackPts').textContent=path.length;
                if(pos.coords.speed!==null) document.getElementById('trackSpeed').textContent=(pos.coords.speed*3.6).toFixed(1)+' km/h';
            },{enableHighAccuracy:true,maximumAge:2000});
            timer=setInterval(()=>{ document.getElementById('trackTime').textContent=fmt(Math.floor((Date.now()-startTime)/1000)); },1000);
            addLog('Tracking started');
        } else {
            tracking=false;
            btn.textContent='▶ Start Tracking'; btn.className='track-btn start';
            navigator.geolocation.clearWatch(watchId); clearInterval(timer);
            addLog('Tracking stopped — '+totalDist.toFixed(2)+' km');
        }
    };
    window.resetTrack = ()=>{
        if(tracking) toggleTracking();
        path=[]; totalDist=0; if(polyline) map.removeLayer(polyline);
        document.getElementById('trackDist').textContent='0.00 km';
        document.getElementById('trackTime').textContent='00:00:00';
        document.getElementById('trackSpeed').textContent='0 km/h';
        document.getElementById('trackPts').textContent='0';
        addLog('Track reset');
    };
    function addLog(msg){
        const el=document.getElementById('trackLog');
        el.innerHTML=`<div class="log-item">${new Date().toLocaleTimeString()} — ${msg}</div>`+el.innerHTML;
    }
})();
</script>
{% endblock %}
