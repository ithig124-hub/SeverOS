{% extends "app_base.html" %}
{% block head %}
<style>
.search-wrap { max-width: 700px; margin: 0 auto; padding-top: 40px; }
.search-box { display: flex; gap: 10px; margin-bottom: 24px; }
.search-box input { flex: 1; padding: 14px 20px; border-radius: 16px; border: 1px solid var(--glass-border); background: var(--glass-bg); backdrop-filter: blur(10px); color: #fff; font-size: 16px; outline: none; }
.search-box input:focus { border-color: var(--accent); }
.search-box button { padding: 14px 24px; border-radius: 16px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; font-size: 15px; }
.engine-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.engine-tab { padding: 6px 14px; border-radius: 10px; border: 1px solid var(--glass-border); background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 12px; transition: 0.2s; }
.engine-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.result-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px; margin-bottom: 12px; transition: 0.2s; }
.result-card:hover { background: var(--glass-hover); }
.result-title { font-size: 15px; font-weight: 600; color: var(--accent-light); margin-bottom: 4px; }
.result-title a { color: inherit; text-decoration: none; }
.result-title a:hover { text-decoration: underline; }
.result-snippet { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.result-url { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; }
</style>
{% endblock %}
{% block content %}
<div class="search-wrap">
    <div style="text-align:center;margin-bottom:30px;">
        <span style="font-size:48px;">🔍</span>
        <h2 style="font-size:22px;margin-top:10px;">Universal Search</h2>
    </div>
    <div class="search-box">
        <input id="searchInput" placeholder="Search anything..." onkeydown="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">Search</button>
    </div>
    <div class="engine-tabs">
        <button class="engine-tab active" onclick="setEngine('wiki',this)">Wikipedia</button>
        <button class="engine-tab" onclick="setEngine('ddg',this)">DuckDuckGo</button>
    </div>
    <div id="searchResults"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
    let engine = 'wiki';
    window.setEngine = (e, btn)=>{
        engine = e;
        document.querySelectorAll('.engine-tab').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
    };
    window.doSearch = ()=>{
        const q = document.getElementById('searchInput').value.trim();
        if(!q) return;
        document.getElementById('searchResults').innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:20px">Searching...</div>';
        if(engine === 'wiki'){
            fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`)
                .then(r=>r.json()).then(d=>{
                    const results = d.query.search;
                    if(!results.length){ document.getElementById('searchResults').innerHTML='<div style="text-align:center;padding:20px;color:var(--text-secondary)">No results</div>'; return; }
                    document.getElementById('searchResults').innerHTML = results.map(r=>`
                        <div class="result-card">
                            <div class="result-title"><a href="https://en.wikipedia.org/wiki/${encodeURIComponent(r.title)}" target="_blank">${r.title}</a></div>
                            <div class="result-snippet">${r.snippet}...</div>
                            <div class="result-url">en.wikipedia.org</div>
                        </div>`).join('');
                });
        } else {
            fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_redirect=1`)
                .then(r=>r.json()).then(d=>{
                    let html = '';
                    if(d.Abstract) html += `<div class="result-card"><div class="result-title"><a href="${d.AbstractURL}" target="_blank">${d.Heading}</a></div><div class="result-snippet">${d.Abstract}</div></div>`;
                    if(d.RelatedTopics) d.RelatedTopics.slice(0,10).forEach(t=>{
                        if(t.Text) html += `<div class="result-card"><div class="result-title"><a href="${t.FirstURL||'#'}" target="_blank">${t.Text.split(' - ')[0]||t.Text.substring(0,60)}</a></div><div class="result-snippet">${t.Text}</div></div>`;
                    });
                    document.getElementById('searchResults').innerHTML = html || '<div style="text-align:center;padding:20px;color:var(--text-secondary)">No results. Try Wikipedia.</div>';
                });
        }
    };
})();
</script>
{% endblock %}
