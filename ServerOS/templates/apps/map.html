{% extends "app_base.html" %}
{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<style>
.map-wrap { position: relative; height: calc(100vh - 130px); border-radius: 18px; overflow: hidden; }
#mapEl { width: 100%; height: 100%; }
.map-panel { position: absolute; top: 14px; left: 14px; z-index: 1000; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); border-radius: 14px; padding: 14px; width: 260px; }
.map-panel input { width: 100%; padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #fff; font-size: 13px; margin-bottom: 8px; outline: none; }
.map-panel input:focus { border-color: var(--accent); }
.map-panel button { width: 100%; padding: 7px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 6px; }
.map-panel button:hover { opacity: 0.85; }
.map-coords { position: absolute; bottom: 14px; right: 14px; z-index: 1000; background: rgba(0,0,0,0.65); backdrop-filter: blur(10px); padding: 8px 14px; border-radius: 10px; font-size: 11px; color: rgba(255,255,255,0.8); }
.saved-pins-list { max-height: 180px; overflow-y: auto; margin-top: 8px; }
.saved-pin { padding: 5px 0; font-size: 11px; color: rgba(255,255,255,0.75); cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.06); }
.saved-pin:hover { color: #fff; }
</style>
{% endblock %}
{% block content %}
<div class="map-wrap">
    <div id="mapEl"></div>
    <div class="map-panel">
        <input id="mapSearch" placeholder="Search a place..." onkeydown="if(event.key==='Enter')searchPlace()">
        <button onclick="searchPlace()">🔍 Search</button>
        <button onclick="toggleSatellite()">🛰 Toggle Satellite</button>
        <div class="saved-pins-list" id="savedPins"></div>
    </div>
    <div class="map-coords" id="mapCoords">Move mouse on map</div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
    const map = L.map('mapEl').setView([20, 0], 3);
    const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19});
    const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19});
    streetLayer.addTo(map);
    let isSat = false;
    window.toggleSatellite = ()=>{
        if(isSat){ map.removeLayer(satLayer); streetLayer.addTo(map); }
        else { map.removeLayer(streetLayer); satLayer.addTo(map); }
        isSat = !isSat;
    };
    map.on('mousemove', e=>{ document.getElementById('mapCoords').textContent = `Lat: ${e.latlng.lat.toFixed(5)} | Lng: ${e.latlng.lng.toFixed(5)}`; });

    const pins = JSON.parse(localStorage.getItem('serveros_map_pins') || '[]');
    const markers = [];
    function renderPins(){
        markers.forEach(m=>map.removeLayer(m)); markers.length=0;
        pins.forEach(p=>{
            const m = L.marker([p.lat,p.lng]).addTo(map).bindPopup(p.label||'Pin');
            markers.push(m);
        });
        const el = document.getElementById('savedPins');
        el.innerHTML = pins.length ? pins.map((p,i)=>`<div class="saved-pin" onclick="flyPin(${p.lat},${p.lng})">${p.label} (${p.lat.toFixed(2)}, ${p.lng.toFixed(2)})</div>`).join('') : '';
        localStorage.setItem('serveros_map_pins', JSON.stringify(pins));
    }
    renderPins();
    map.on('click', e=>{
        const label = prompt('Pin label:', 'Pin '+(pins.length+1));
        if(label!==null){ pins.push({lat:e.latlng.lat,lng:e.latlng.lng,label}); renderPins(); }
    });
    window.flyPin = (lat,lng)=>{ map.flyTo([lat,lng],12); };
    window.searchPlace = ()=>{
        const q = document.getElementById('mapSearch').value.trim();
        if(!q) return;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`)
            .then(r=>r.json()).then(d=>{
                if(d.length){ map.flyTo([parseFloat(d[0].lat), parseFloat(d[0].lon)], 13); }
            });
    };
})();
</script>
{% endblock %}
