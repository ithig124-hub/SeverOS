{% extends "app_base.html" %}
{% block head %}
<style>
.wp-section { margin-bottom: 28px; }
.wp-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.wp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.wp-card { height: 130px; border-radius: 16px; cursor: pointer; position: relative; overflow: hidden; border: 2px solid transparent; transition: 0.25s; }
.wp-card:hover { transform: translateY(-3px); border-color: var(--accent); }
.wp-card.active { border-color: #22c55e; box-shadow: 0 0 0 2px #22c55e44; }
.wp-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 12px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); font-size: 12px; font-weight: 500; }
.wp-custom { margin-top: 16px; }
.wp-custom input { width: 100%; padding: 10px 16px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none; margin-bottom: 10px; }
.wp-custom input:focus { border-color: var(--accent); }
.wp-custom button { padding: 10px 20px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }
.wp-preview { margin-top: 20px; }
.wp-preview-box { width: 100%; height: 200px; border-radius: 16px; border: 1px solid var(--glass-border); overflow: hidden; }
</style>
{% endblock %}
{% block content %}
<div class="wp-section">
    <h3>🌈 Gradients</h3>
    <div class="wp-grid" id="gradientGrid"></div>
</div>
<div class="wp-section">
    <h3>🖼 Image Wallpapers</h3>
    <div class="wp-grid" id="imageGrid"></div>
</div>
<div class="wp-section">
    <h3>🔗 Custom URL</h3>
    <div class="wp-custom">
        <input id="customUrl" placeholder="Paste an image URL...">
        <button onclick="setCustom()">Apply Custom Wallpaper</button>
    </div>
</div>
<div class="wp-preview">
    <h3 style="font-size:14px;margin-bottom:10px;">Preview</h3>
    <div class="wp-preview-box" id="wpPreview"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
    const gradients = [
        { name:'Deep Space', value:'linear-gradient(135deg, #0f0c29, #302b63, #24243e)' },
        { name:'Ocean Blue', value:'linear-gradient(135deg, #0f2027, #203a43, #2c5364)' },
        { name:'Sunset', value:'linear-gradient(135deg, #fc4a1a, #f7b733)' },
        { name:'Purple Haze', value:'linear-gradient(135deg, #7b2ff7, #c084fc, #e879f9)' },
        { name:'Northern Lights', value:'linear-gradient(135deg, #0b3d0b, #1a6b3c, #00d2ff)' },
        { name:'Ember', value:'linear-gradient(135deg, #1a1a2e, #e94560, #0f3460)' },
        { name:'Midnight', value:'linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e)' },
        { name:'Candy', value:'linear-gradient(135deg, #ff6b6b, #ffa07a, #ffd93d, #6bcb77)' },
    ];
    const images = [
        { name:'Mountains', value:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80' },
        { name:'Stars', value:'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920&q=80' },
        { name:'Forest', value:'https://images.unsplash.com/photo-1448375240586-882707db888b?w=1920&q=80' },
        { name:'City Night', value:'https://images.unsplash.com/photo-1514565131-fce0801e5785?w=1920&q=80' },
        { name:'Aurora', value:'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=1920&q=80' },
        { name:'Beach', value:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=80' },
    ];

    let current = null;
    fetch('/api/wallpaper').then(r=>r.json()).then(d=>{ current=d; renderAll(); });

    function renderAll(){
        document.getElementById('gradientGrid').innerHTML = gradients.map(g=>`
            <div class="wp-card ${current&&current.type==='gradient'&&current.value===g.value?'active':''}"
                 style="background:${g.value}" onclick="applyGradient(\`${g.value}\`)">
                <div class="wp-label">${g.name}</div>
            </div>`).join('');
        document.getElementById('imageGrid').innerHTML = images.map(im=>`
            <div class="wp-card ${current&&current.type==='image'&&current.value===im.value?'active':''}"
                 style="background:url('${im.value}') center/cover" onclick="applyImage('${im.value}')">
                <div class="wp-label">${im.name}</div>
            </div>`).join('');
        if(current) updatePreview();
    }
    function save(type, value){
        current = {type, value};
        fetch('/api/wallpaper',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(current)}).then(()=>renderAll());
    }
    function updatePreview(){
        const box = document.getElementById('wpPreview');
        if(current.type==='image') box.style.background=`url('${current.value}') center/cover`;
        else box.style.background=current.value;
    }
    window.applyGradient = v=>save('gradient',v);
    window.applyImage = v=>save('image',v);
    window.setCustom = ()=>{
        const url = document.getElementById('customUrl').value.trim();
        if(url) save('image', url);
    };
})();
</script>
{% endblock %}
