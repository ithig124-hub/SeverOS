{% extends "app_base.html" %}
{% block head %}
<style>
.lib-layout { display: grid; grid-template-columns: 1fr 360px; gap: 20px; height: calc(100vh - 130px); }
.lib-main { overflow-y: auto; }
.lib-saved { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 18px; overflow-y: auto; }
.lib-search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
.lib-search-bar input { flex: 1; padding: 10px 16px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.06); color: #fff; font-size: 14px; outline: none; }
.lib-search-bar input:focus { border-color: var(--accent); }
.lib-search-bar button { padding: 10px 20px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; }
.lib-search-bar button:hover { opacity: 0.85; }
.book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
.book-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; overflow: hidden; transition: 0.25s; cursor: pointer; }
.book-card:hover { transform: translateY(-3px); background: var(--glass-hover); }
.book-cover { width: 100%; height: 200px; object-fit: cover; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 60px; }
.book-info { padding: 12px; }
.book-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.book-author { font-size: 11px; color: var(--text-secondary); }
.book-actions { display: flex; gap: 6px; margin-top: 8px; }
.book-actions button { flex: 1; padding: 5px; border: 1px solid var(--glass-border); border-radius: 8px; background: rgba(255,255,255,0.06); color: #fff; font-size: 11px; cursor: pointer; transition: 0.2s; }
.book-actions button:hover { background: rgba(255,255,255,0.12); }
.saved-item { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 12px; }
.saved-item a { color: var(--accent-light); text-decoration: none; }
.lib-status { text-align: center; color: var(--text-secondary); padding: 40px; font-size: 14px; }
@media(max-width:900px){ .lib-layout { grid-template-columns: 1fr; } .lib-saved { max-height: 200px; } }
</style>
{% endblock %}
{% block content %}
<div class="lib-layout">
    <div class="lib-main">
        <div class="lib-search-bar">
            <input id="libQuery" placeholder="Search Internet Archive..." onkeydown="if(event.key==='Enter')searchBooks()">
            <button onclick="searchBooks()">🔍 Search</button>
        </div>
        <div id="libResults" class="book-grid">
            <div class="lib-status">Search millions of books from Internet Archive</div>
        </div>
    </div>
    <div class="lib-saved">
        <h3 style="font-size:14px;margin-bottom:12px;">📖 My Library</h3>
        <div id="savedBooks">No saved books yet</div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
    let saved = JSON.parse(localStorage.getItem('serveros_library') || '[]');
    renderSaved();

    window.searchBooks = function(){
        const q = document.getElementById('libQuery').value.trim();
        if(!q) return;
        document.getElementById('libResults').innerHTML = '<div class="lib-status">Searching...</div>';
        fetch(`https://archive.org/advancedsearch.php?q=${encodeURIComponent(q)}&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=year&fl[]=subject&rows=20&output=json`)
            .then(r=>r.json()).then(d=>{
                const docs = d.response.docs;
                if(!docs.length){ document.getElementById('libResults').innerHTML='<div class="lib-status">No results found</div>'; return; }
                document.getElementById('libResults').innerHTML = docs.map(b=>{
                    const cover = `https://archive.org/services/img/${b.identifier}`;
                    return `<div class="book-card">
                        <div class="book-cover"><img src="${cover}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='📚'"></div>
                        <div class="book-info">
                            <div class="book-title">${b.title||'Untitled'}</div>
                            <div class="book-author">${b.creator||'Unknown'} ${b.year?'('+b.year+')':''}</div>
                            <div class="book-actions">
                                <button onclick="saveBook('${b.identifier}','${(b.title||'').replace(/'/g,"\\'")}','${(b.creator||'').replace(/'/g,"\\'")}')">💾 Save</button>
                                <button onclick="window.open('https://archive.org/details/${b.identifier}','_blank')">📖 Read</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }).catch(()=>{ document.getElementById('libResults').innerHTML='<div class="lib-status">Search failed</div>'; });
    };
    window.saveBook = function(id, title, author){
        if(saved.find(b=>b.id===id)) return;
        saved.push({id, title, author});
        localStorage.setItem('serveros_library', JSON.stringify(saved));
        renderSaved();
    };
    function renderSaved(){
        if(!saved.length){ document.getElementById('savedBooks').innerHTML='No saved books yet'; return; }
        document.getElementById('savedBooks').innerHTML = saved.map((b,i)=>`
            <div class="saved-item">
                <a href="https://archive.org/details/${b.id}" target="_blank">${b.title}</a>
                <div style="color:var(--text-secondary);font-size:11px;">${b.author}</div>
            </div>`).join('');
    }
})();
</script>
{% endblock %}
