{% extends "app_base.html" %}
{% block head %}
<style>
.clocks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.clock-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 20px; text-align: center; transition: 0.25s; position: relative; overflow: hidden; }
.clock-card:hover { background: var(--glass-hover); transform: translateY(-2px); }
.clock-card.night { border-left: 3px solid #6366f1; }
.clock-card.day { border-left: 3px solid #f59e0b; }
.clock-city { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.clock-time { font-size: 32px; font-weight: 300; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
.clock-date { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.clock-tz { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; }
.clock-indicator { font-size: 18px; position: absolute; top: 12px; right: 14px; }
.add-tz { margin-top: 20px; display: flex; gap: 10px; max-width: 400px; }
.add-tz select, .add-tz button { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; }
.add-tz button { background: var(--accent); border: none; cursor: pointer; font-weight: 600; }
</style>
{% endblock %}
{% block content %}
<div style="text-align:center;margin-bottom:24px;">
    <div style="font-size:48px;">🕐</div>
    <h2 style="font-size:20px;margin-top:8px;">World Clock</h2>
    <p style="color:var(--text-secondary);font-size:13px;margin-top:4px;">Live times around the world</p>
</div>
<div class="clocks-grid" id="clocksGrid">Loading...</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
    function update(){
        fetch('/app/worldclock/api/time').then(r=>r.json()).then(zones=>{
            document.getElementById('clocksGrid').innerHTML = zones.map(z=>{
                const isNight = z.hour < 6 || z.hour >= 20;
                const indicator = isNight ? '🌙' : (z.hour < 12 ? '☀️' : '🌤');
                return `<div class="clock-card ${isNight?'night':'day'}">
                    <div class="clock-indicator">${indicator}</div>
                    <div class="clock-city">${z.city}</div>
                    <div class="clock-time">${z.time}</div>
                    <div class="clock-date">${z.date}</div>
                    <div class="clock-tz">${z.tz} (UTC${z.offset>=0?'+':''}${z.offset})</div>
                </div>`;
            }).join('');
        });
    }
    update();
    setInterval(update, 1000);
})();
</script>
{% endblock %}
