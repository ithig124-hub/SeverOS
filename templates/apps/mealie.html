{% extends "app_base.html" %}
{% block head %}
<style>
.ml-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; height: calc(100vh - 130px); }
.ml-main { display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
.ml-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 20px; }
.ml-card h2 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.ml-search { display: flex; gap: 8px; margin-bottom: 14px; }
.ml-search input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none; }
.ml-search input:focus { border-color: var(--accent); }
.recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; }
.recipe-card { background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; cursor: pointer; transition: 0.2s; }
.recipe-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }
.recipe-emoji { font-size: 36px; margin-bottom: 8px; }
.recipe-name { font-size: 14px; font-weight: 600; }
.recipe-cat { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.recipe-time { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.ml-form label { font-size: 11px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 4px; margin-top: 10px; }
.ml-form input, .ml-form textarea, .ml-form select { width: 100%; padding: 9px 12px; border-radius: 9px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none; box-sizing: border-box; font-family: var(--font); }
.ml-form input:focus, .ml-form textarea:focus { border-color: var(--accent); }
.ml-form textarea { resize: vertical; min-height: 80px; }
.ml-form button { margin-top: 14px; width: 100%; padding: 10px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }
.empty-state { text-align: center; color: var(--text-secondary); padding: 30px; font-size: 13px; }
/* Detail modal */
.recipe-detail { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.recipe-detail.show { display: flex; }
.detail-card { background: #1a1a2e; border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 28px; max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative; }
.detail-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
.detail-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.detail-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }
.detail-section { margin-top: 14px; }
.detail-section-title { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.detail-text { font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.7; white-space: pre-wrap; }
.detail-del { margin-top: 16px; padding: 8px 18px; border-radius: 9px; border: 1px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); color: #ef4444; cursor: pointer; font-size: 12px; }
</style>
{% endblock %}
{% block content %}
<div class="ml-layout">
  <div class="ml-main">
    <div class="ml-card">
      <h2>🍲 My Recipes</h2>
      <div class="ml-search"><input type="text" id="searchInput" placeholder="Search recipes..." oninput="filterRecipes()"></div>
      <div class="recipe-grid" id="recipeGrid"></div>
    </div>
  </div>
  <div>
    <div class="ml-card">
      <h2>➕ Add Recipe</h2>
      <div class="ml-form">
        <label>Emoji</label>
        <input type="text" id="recipeEmoji" placeholder="🍝" maxlength="4">
        <label>Recipe Name</label>
        <input type="text" id="recipeName" placeholder="e.g. Spaghetti Bolognese">
        <label>Category</label>
        <select id="recipeCat">
          <option>🍝 Pasta</option>
          <option>🥗 Salad</option>
          <option>🥩 Meat</option>
          <option>🐟 Seafood</option>
          <option>🥦 Vegetarian</option>
          <option>🍲 Stew</option>
          <option>🥐 Baking</option>
          <option>🍰 Dessert</option>
          <option>🥤 Drink</option>
          <option>🍽️ Other</option>
        </select>
        <label>Prep + Cook Time</label>
        <input type="text" id="recipeTime" placeholder="e.g. 30 mins">
        <label>Ingredients</label>
        <textarea id="recipeIngredients" placeholder="List ingredients, one per line..."></textarea>
        <label>Instructions</label>
        <textarea id="recipeInstructions" placeholder="Step-by-step instructions..."></textarea>
        <button onclick="addRecipe()">+ Save Recipe</button>
      </div>
    </div>
  </div>
</div>

<div class="recipe-detail" id="recipeDetail">
  <div class="detail-card">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div id="detailContent"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
  let recipes=[], filtered=[];
  function loadRecipes(){
    fetch('/app/mealie/api/recipes').then(r=>r.json()).then(d=>{
      recipes=d||[];
      filtered=recipes;
      renderGrid(filtered);
    });
  }
  function renderGrid(list){
    const el=document.getElementById('recipeGrid');
    if(!list.length){ el.innerHTML='<div class="empty-state" style="grid-column:1/-1">No recipes yet. Add your first one!</div>'; return; }
    el.innerHTML=list.map(r=>`
      <div class="recipe-card" onclick="showDetail('${r.id}')">
        <div class="recipe-emoji">${r.emoji||'🍽️'}</div>
        <div class="recipe-name">${r.name}</div>
        <div class="recipe-cat">${r.category||''}</div>
        ${r.time?`<div class="recipe-time">⏱ ${r.time}</div>`:''}
      </div>`).join('');
  }
  window.filterRecipes=function(){
    const q=document.getElementById('searchInput').value.toLowerCase();
    filtered=recipes.filter(r=>r.name.toLowerCase().includes(q)||(r.category||'').toLowerCase().includes(q));
    renderGrid(filtered);
  };
  window.addRecipe=function(){
    const name=document.getElementById('recipeName').value.trim();
    if(!name) return;
    const recipe={id:Date.now().toString(),name,emoji:document.getElementById('recipeEmoji').value||'🍽️',category:document.getElementById('recipeCat').value,time:document.getElementById('recipeTime').value,ingredients:document.getElementById('recipeIngredients').value,instructions:document.getElementById('recipeInstructions').value};
    fetch('/app/mealie/api/recipes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(recipe)}).then(()=>{
      ['recipeName','recipeEmoji','recipeTime','recipeIngredients','recipeInstructions'].forEach(id=>document.getElementById(id).value='');
      loadRecipes();
    });
  };
  window.showDetail=function(id){
    const r=recipes.find(x=>x.id===id);
    if(!r) return;
    document.getElementById('detailContent').innerHTML=`
      <div style="font-size:48px;margin-bottom:10px">${r.emoji||'🍽️'}</div>
      <div class="detail-title">${r.name}</div>
      <div class="detail-meta">${r.category||''} ${r.time?'· ⏱ '+r.time:''}</div>
      ${r.ingredients?`<div class="detail-section"><div class="detail-section-title">Ingredients</div><div class="detail-text">${r.ingredients}</div></div>`:''}
      ${r.instructions?`<div class="detail-section"><div class="detail-section-title">Instructions</div><div class="detail-text">${r.instructions}</div></div>`:''}
      <button class="detail-del" onclick="deleteRecipe('${r.id}')">🗑 Delete Recipe</button>`;
    document.getElementById('recipeDetail').classList.add('show');
  };
  window.closeDetail=function(){ document.getElementById('recipeDetail').classList.remove('show'); };
  window.deleteRecipe=function(id){
    fetch('/app/mealie/api/recipes/'+id,{method:'DELETE'}).then(()=>{ closeDetail(); loadRecipes(); });
  };
  loadRecipes();
})();
</script>
{% endblock %}
