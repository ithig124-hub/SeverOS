{% extends "app_base.html" %}
{% block head %}
<style>
.wx-layout { display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
.wx-current { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 28px; text-align: center; }
.wx-location { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
.wx-icon { font-size: 72px; margin: 10px 0; }
.wx-temp { font-size: 52px; font-weight: 700; line-height: 1; }
.wx-desc { font-size: 14px; color: var(--text-secondary); margin-top: 8px; text-transform: capitalize; }
.wx-meta { display: flex; justify-content: center; gap: 24px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--glass-border); }
.wx-meta-item { text-align: center; }
.wx-meta-val { font-size: 16px; font-weight: 600; }
.wx-meta-lbl { font-size: 11px; color: var(--text-secondary); }
.wx-right { display: flex; flex-direction: column; gap: 14px; }
.forecast-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 18px; }
.forecast-card h3 { font-size: 13px; font-weight: 700; margin-bottom: 14px; }
.forecast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px,1fr)); gap: 10px; }
.fc-day { background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 10px; padding: 12px 8px; text-align: center; }
.fc-name { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; }
.fc-icon { font-size: 28px; margin: 8px 0; }
.fc-hi { font-size: 14px; font-weight: 700; }
.fc-lo { font-size: 12px; color: var(--text-secondary); }
.location-bar { display: flex; gap: 8px; margin-bottom: 20px; }
.location-bar input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none; }
.location-bar input:focus { border-color: var(--accent); }
.location-bar button { padding: 10px 18px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
.wx-loading { text-align: center; color: var(--text-secondary); padding: 40px; }
.wx-err { color: #ef4444; font-size: 13px; text-align: center; padding: 20px; }
.hourly-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
.hr-item { flex-shrink: 0; text-align: center; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 10px; padding: 10px 12px; }
.hr-time { font-size: 10px; color: var(--text-secondary); }
.hr-icon { font-size: 18px; margin: 4px 0; }
.hr-temp { font-size: 13px; font-weight: 600; }
@media(max-width:900px){ .wx-layout { grid-template-columns: 1fr; } }
</style>
{% endblock %}
{% block content %}
<div class="location-bar">
  <input type="text" id="locInput" placeholder="City name (e.g. London, Perth, Tokyo)" value="">
  <button onclick="fetchWeather()">🔍 Search</button>
</div>
<div id="wxContent">
  <div class="wx-loading" id="wxLoading">🌤️ Loading weather...</div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
  const WMO_CODES={
    0:'Clear Sky',1:'Mainly Clear',2:'Partly Cloudy',3:'Overcast',
    45:'Fog',48:'Depositing Rime Fog',
    51:'Light Drizzle',53:'Moderate Drizzle',55:'Dense Drizzle',
    61:'Slight Rain',63:'Moderate Rain',65:'Heavy Rain',
    71:'Slight Snow',73:'Moderate Snow',75:'Heavy Snow',
    80:'Slight Showers',81:'Moderate Showers',82:'Violent Showers',
    95:'Thunderstorm',96:'Thunderstorm w/ Hail',99:'Thunderstorm w/ Heavy Hail'
  };
  const WMO_ICONS={
    0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
    51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',
    71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌦️',82:'⛈️',
    95:'⛈️',96:'⛈️',99:'⛈️'
  };
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let currentCity='Perth';

  function geocode(city){
    return fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`)
      .then(r=>r.json()).then(d=>{
        if(!d.results||!d.results.length) throw new Error('City not found');
        return d.results[0];
      });
  }

  function fetchForecast(lat,lon){
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weathercode&hourly=temperature_2m,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`;
    return fetch(url).then(r=>r.json());
  }

  window.fetchWeather=function(){
    const city=document.getElementById('locInput').value.trim()||currentCity;
    currentCity=city;
    document.getElementById('wxContent').innerHTML='<div class="wx-loading" id="wxLoading">🔍 Looking up '+city+'...</div>';
    geocode(city).then(loc=>fetchForecast(loc.latitude,loc.longitude).then(data=>render(data,loc)))
      .catch(e=>{ document.getElementById('wxContent').innerHTML='<div class="wx-err">❌ '+e.message+'</div>'; });
  };

  function render(data, loc){
    const c=data.current;
    const wcode=c.weathercode||0;
    const today=new Date();
    // Hourly — next 24 hours
    const hours=data.hourly.time.slice(0,24);
    const htemps=data.hourly.temperature_2m.slice(0,24);
    const hcodes=data.hourly.weathercode.slice(0,24);
    const hourlyHTML=hours.map((t,i)=>{
      const h=new Date(t).getHours();
      return `<div class="hr-item"><div class="hr-time">${h}:00</div><div class="hr-icon">${WMO_ICONS[hcodes[i]]||'🌤️'}</div><div class="hr-temp">${Math.round(htemps[i])}°</div></div>`;
    }).join('');
    // Daily forecast
    const fcHTML=data.daily.time.map((d,i)=>{
      const day=new Date(d);
      return `<div class="fc-day">
        <div class="fc-name">${i===0?'Today':DAYS[day.getDay()]}</div>
        <div class="fc-icon">${WMO_ICONS[data.daily.weathercode[i]]||'🌤️'}</div>
        <div class="fc-hi">${Math.round(data.daily.temperature_2m_max[i])}°</div>
        <div class="fc-lo">${Math.round(data.daily.temperature_2m_min[i])}°</div>
      </div>`;
    }).join('');

    document.getElementById('wxContent').innerHTML=`
      <div class="wx-layout">
        <div class="wx-current">
          <div class="wx-location">📍 ${loc.name}${loc.country_code?', '+loc.country_code:''}</div>
          <div class="wx-icon">${WMO_ICONS[wcode]||'🌤️'}</div>
          <div class="wx-temp">${Math.round(c.temperature_2m)}°C</div>
          <div class="wx-desc">${WMO_CODES[wcode]||'Unknown'}</div>
          <div class="wx-meta">
            <div class="wx-meta-item"><div class="wx-meta-val">${c.relative_humidity_2m}%</div><div class="wx-meta-lbl">Humidity</div></div>
            <div class="wx-meta-item"><div class="wx-meta-val">${Math.round(c.wind_speed_10m)} km/h</div><div class="wx-meta-lbl">Wind</div></div>
          </div>
        </div>
        <div class="wx-right">
          <div class="forecast-card">
            <h3>🕐 Hourly (next 24h)</h3>
            <div class="hourly-row">${hourlyHTML}</div>
          </div>
          <div class="forecast-card">
            <h3>📅 7-Day Forecast</h3>
            <div class="forecast-grid">${fcHTML}</div>
          </div>
        </div>
      </div>`;
  }

  // Auto-load on open
  fetchWeather();
})();
</script>
{% endblock %}
