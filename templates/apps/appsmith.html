{% extends "app_base.html" %}

{% block content %}
<div class="glass-panel" style="max-width: 500px; margin: 0 auto;">
    <h2>Create New App</h2>
    <p style="color: rgba(255,255,255,0.5); margin-bottom: 20px;">Add a native page or a link to an external site.</p>
    
    <div style="display: flex; flex-direction: column; gap: 16px;">
        <div>
            <label style="display: block; font-size: 12px; margin-bottom: 6px;">App Name</label>
            <input type="text" id="appName" placeholder="e.g. My Website" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; color: white; border-radius: 8px;">
        </div>
        
        <div>
            <label style="display: block; font-size: 12px; margin-bottom: 6px;">Icon (Emoji)</label>
            <input type="text" id="appIcon" placeholder="🚀" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; color: white; border-radius: 8px;">
        </div>
        
        <div>
            <label style="display: block; font-size: 12px; margin-bottom: 6px;">External URL (Optional)</label>
            <input type="text" id="appUrl" placeholder="https://..." style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; color: white; border-radius: 8px;">
            <small style="color: rgba(255,255,255,0.3); font-size: 10px;">Leave blank for a native empty page.</small>
        </div>
        
        <button onclick="createApp()" style="margin-top: 10px; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer;">
            ✨ Create App
        </button>
    </div>
</div>

<script>
async function createApp() {
    const name = document.getElementById('appName').value;
    const icon = document.getElementById('appIcon').value;
    const url = document.getElementById('appUrl').value;
    
    if (!name) return alert("Name is required");
    
    try {
        const res = await fetch('/api/appsmith/create', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, icon, url })
        });
        const data = await res.json();
        if (data.status === 'success') {
            alert("App Created! Restart SeverOS to see it on your dashboard.");
            window.location.href = '/';
        } else {
            alert("Error: " + data.error);
        }
    } catch (e) {
        alert("Failed to create app.");
    }
}
</script>
{% endblock %}
