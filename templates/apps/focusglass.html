{% extends "app_base.html" %}
{% block head %}
<style>
.fg-layout { max-width: 700px; margin: 0 auto; }
.fg-timer-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 40px; text-align: center; margin-bottom: 16px; }
.fg-clock { font-size: 80px; font-weight: 700; letter-spacing: -4px; line-height: 1; font-variant-numeric: tabular-nums; font-family: var(--font); }
.fg-phase { font-size: 14px; color: var(--text-secondary); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
.fg-task-label { font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.8); min-height: 24px; }
.fg-controls { display: flex; gap: 12px; justify-content: center; margin-top: 28px; }
.fg-btn { padding: 12px 28px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.07); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
.fg-btn:hover { background: rgba(255,255,255,0.12); }
.fg-btn.primary { background: var(--accent); border-color: var(--accent); }
.fg-btn.primary:hover { opacity: 0.85; }
.fg-btn.danger { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: #ef4444; }
.fg-progress { width: 80%; margin: 24px auto 0; height: 6px; background: rgba(255,255,255,0.06); border-radius: 6px; overflow: hidden; }
.fg-progress-fill { height: 100%; background: var(--accent); border-radius: 6px; transition: width 1s linear; }
.fg-sessions { display: flex; gap: 6px; justify-content: center; margin-top: 16px; }
.fg-session-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); transition: 0.2s; }
.fg-session-dot.done { background: var(--accent); border-color: var(--accent); }
.fg-session-dot.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
/* Config Panel */
.fg-config { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.fg-config h3 { font-size: 13px; font-weight: 700; margin-bottom: 14px; }
.fg-config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 14px; }
.fg-config-item label { font-size: 11px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; display: block; margin-bottom: 5px; }
.fg-config-item input, .fg-config-item select { width: 100%; padding: 9px 12px; border-radius: 9px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none; box-sizing: border-box; }
.fg-config-item input:focus { border-color: var(--accent); }
/* Task */
.fg-task-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 20px; }
.fg-task-card h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
.fg-task-input { display: flex; gap: 8px; }
.fg-task-input input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.06); color: #fff; font-size: 13px; outline: none; }
.fg-task-input input:focus { border-color: var(--accent); }
.fg-task-input button { padding: 10px 18px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }
.fg-log { margin-top: 12px; max-height: 140px; overflow-y: auto; }
.fg-log-item { padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; color: var(--text-secondary); display: flex; gap: 8px; }
.fg-log-item:last-child { border-bottom: none; }
</style>
{% endblock %}
{% block content %}
<div class="fg-layout">
  <div class="fg-config">
    <h3>⚙️ Timer Settings</h3>
    <div class="fg-config-grid">
      <div class="fg-config-item">
        <label>Focus Time (min)</label>
        <input type="number" id="cfgFocus" value="25" min="1" max="120">
      </div>
      <div class="fg-config-item">
        <label>Short Break (min)</label>
        <input type="number" id="cfgShort" value="5" min="1" max="30">
      </div>
      <div class="fg-config-item">
        <label>Long Break (min)</label>
        <input type="number" id="cfgLong" value="15" min="1" max="60">
      </div>
      <div class="fg-config-item">
        <label>Sessions Before Long Break</label>
        <input type="number" id="cfgSessions" value="4" min="1" max="10">
      </div>
    </div>
  </div>

  <div class="fg-timer-card">
    <div class="fg-phase" id="phaseLabel">FOCUS</div>
    <div class="fg-clock" id="clockDisplay">25:00</div>
    <div class="fg-task-label" id="activeTask">—</div>
    <div class="fg-progress"><div class="fg-progress-fill" id="progressFill" style="width:100%"></div></div>
    <div class="fg-sessions" id="sessionDots"></div>
    <div class="fg-controls">
      <button class="fg-btn primary" id="startBtn" onclick="startStop()">▶ Start</button>
      <button class="fg-btn" onclick="skipPhase()">⏭ Skip</button>
      <button class="fg-btn danger" onclick="resetTimer()">↺ Reset</button>
    </div>
  </div>

  <div class="fg-task-card">
    <h3>📋 Focus Log</h3>
    <div class="fg-task-input">
      <input type="text" id="taskInput" placeholder="What are you focusing on?" onkeydown="if(event.key==='Enter') setTask()">
      <button onclick="setTask()">Set</button>
    </div>
    <div class="fg-log" id="focusLog"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function(){
  let interval=null, timeLeft=0, totalTime=0, running=false;
  let phase='focus', sessionsCompleted=0;
  let taskName='', focusLog=[];

  function getCfg(){
    return {
      focus: parseInt(document.getElementById('cfgFocus').value)||25,
      shortBreak: parseInt(document.getElementById('cfgShort').value)||5,
      longBreak: parseInt(document.getElementById('cfgLong').value)||15,
      sessions: parseInt(document.getElementById('cfgSessions').value)||4
    };
  }

  function phaseTime(p){
    const c=getCfg();
    if(p==='focus') return c.focus*60;
    if(p==='short') return c.shortBreak*60;
    if(p==='long') return c.longBreak*60;
    return c.focus*60;
  }

  function phaseLabel(p){
    if(p==='focus') return 'FOCUS';
    if(p==='short') return 'SHORT BREAK';
    if(p==='long') return 'LONG BREAK';
    return '';
  }

  function formatTime(s){ const m=Math.floor(s/60); return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

  function render(){
    document.getElementById('clockDisplay').textContent=formatTime(timeLeft);
    document.getElementById('phaseLabel').textContent=phaseLabel(phase);
    document.getElementById('activeTask').textContent=taskName||'—';
    const pct=totalTime?((timeLeft/totalTime)*100):100;
    document.getElementById('progressFill').style.width=pct+'%';
    document.getElementById('startBtn').textContent=running?'⏸ Pause':'▶ Start';
    renderDots();
  }

  function renderDots(){
    const c=getCfg();
    let html='';
    for(let i=0;i<c.sessions;i++){
      let cls='';
      if(i<sessionsCompleted) cls='done';
      else if(i===sessionsCompleted&&phase==='focus') cls='active';
      html+=`<div class="fg-session-dot ${cls}"></div>`;
    }
    document.getElementById('sessionDots').innerHTML=html;
  }

  function init(){
    totalTime=timeLeft=phaseTime(phase);
    render();
  }

  window.startStop=function(){
    if(running){ clearInterval(interval); interval=null; running=false; render(); return; }
    running=true;
    render();
    interval=setInterval(()=>{
      timeLeft--;
      if(timeLeft<=0){ phaseComplete(); return; }
      render();
    },1000);
  };

  function phaseComplete(){
    clearInterval(interval); interval=null; running=false;
    if(phase==='focus'){
      sessionsCompleted++;
      const c=getCfg();
      if(taskName){ focusLog.unshift({task:taskName, time:new Date().toLocaleTimeString(), duration:c.focus}); renderLog(); }
      phase=sessionsCompleted%c.sessions===0?'long':'short';
    } else {
      phase='focus';
    }
    totalTime=timeLeft=phaseTime(phase);
    render();
    // Auto-start next phase
    startStop();
  }

  window.skipPhase=function(){ phaseComplete(); };

  window.resetTimer=function(){
    clearInterval(interval); interval=null; running=false;
    phase='focus'; sessionsCompleted=0;
    init();
  };

  window.setTask=function(){
    taskName=document.getElementById('taskInput').value.trim();
    render();
  };

  function renderLog(){
    const el=document.getElementById('focusLog');
    if(!focusLog.length){ el.innerHTML='<div style="color:var(--text-secondary);font-size:12px;padding:10px 0">No sessions completed yet.</div>'; return; }
    el.innerHTML=focusLog.slice(0,10).map(l=>`<div class="fg-log-item"><span>✅</span><span>${l.task}</span><span style="margin-left:auto">${l.duration}min · ${l.time}</span></div>`).join('');
  }

  init();
  renderLog();
})();
</script>
{% endblock %}
